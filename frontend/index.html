<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <meta name="theme-color" content="#004643" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BukuKasKu" />
    <link rel="apple-touch-icon" href="/BukuKasKu-192x192.png" />

    <link rel="icon" type="image/png" href="/BukuKasKu-192x192.png" />
    <title>BukuKasKu</title>
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />

    <style>
      @keyframes splash-in {
        from { opacity: 0; transform: scale(0.82); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes splash-pulse {
        0%, 100% { box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 0 rgba(0,70,67,0.15); }
        50%       { box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 14px rgba(0,70,67,0); }
      }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
        40%            { transform: translateY(-6px); opacity: 1; }
      }
      @keyframes splash-bar {
        0%   { width: 0%; opacity: 1; }
        85%  { width: 90%; opacity: 1; }
        100% { width: 98%; opacity: 0.7; }
      }
      #splash-content {
        display: flex; flex-direction: column; align-items: center; gap: 14px;
        animation: splash-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      #splash-logo {
        width:96px; height:96px; border-radius:28px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        animation: splash-pulse 1.2s ease-in-out 0.4s infinite;
      }
      .splash-dot {
        width:7px; height:7px; border-radius:50%;
        background:#004643; display:inline-block;
        animation: splash-bounce 0.7s ease-in-out infinite;
      }
      #splash-bar-track {
        width:120px; height:3px; border-radius:99px;
        background:rgba(0,70,67,0.1); overflow:hidden;
        margin-top:4px;
      }
      #splash-bar-fill {
        height:100%; border-radius:99px;
        background: linear-gradient(90deg,#004643,#abd1c6);
        animation: splash-bar 1s cubic-bezier(0.4,0,0.2,1) forwards;
      }
    </style>
  </head>
  <body>
    <!-- Inline splash — visible immediately before JS loads, hidden once React mounts -->
    <div id="html-splash" style="
      position:fixed;inset:0;z-index:999999;
      background:#ffffff;
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;
      font-family:'Outfit',sans-serif;
    ">
      <div id="splash-content">
        <img id="splash-logo" src="/BukuKasKu-192x192.png" alt="BukuKasKu" />
        <div style="text-align:center">
          <h1 style="color:#001e1d;font-size:2rem;font-weight:800;margin:0;letter-spacing:-0.5px;">BukuKasKu</h1>
          <p style="color:#94a3b8;font-size:0.8rem;margin:6px 0 0;font-weight:500;">Kelola keuangan pribadi dengan cerdas</p>
        </div>
        <div id="splash-bar-track"><div id="splash-bar-fill"></div></div>
      </div>

      <!-- Bouncing dots -->
      <div style="position:absolute;bottom:52px;display:flex;gap:7px;align-items:center;">
        <span class="splash-dot" style="animation-delay:0s"></span>
        <span class="splash-dot" style="animation-delay:0.18s"></span>
        <span class="splash-dot" style="animation-delay:0.36s"></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
